name: autodash-app

services:
  app:
    image: node:22-bookworm
    restart: unless-stopped
    init: true
    working_dir: /app
    command:
      - sh
      - -lc
      - corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm preview --host 0.0.0.0 --port 3300
    environment:
      APP_DATABASE_ENCRYPTION_KEY: ${APP_DATABASE_ENCRYPTION_KEY:-}
      APP_DATABASE_URL: ${APP_DATABASE_URL:-}
      NODE_ENV: production
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3300
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:3300}
      NUXT_OIDC_AUTH_SESSION_SECRET: ${NUXT_OIDC_AUTH_SESSION_SECRET:-}
      NUXT_OIDC_PROVIDERS_OIDC_AUTHORIZATION_URL: ${NUXT_OIDC_PROVIDERS_OIDC_AUTHORIZATION_URL:-}
      NUXT_OIDC_PROVIDERS_OIDC_CLIENT_ID: ${NUXT_OIDC_PROVIDERS_OIDC_CLIENT_ID:-}
      NUXT_OIDC_PROVIDERS_OIDC_CLIENT_SECRET: ${NUXT_OIDC_PROVIDERS_OIDC_CLIENT_SECRET:-}
      NUXT_OIDC_PROVIDERS_OIDC_ISSUER: ${NUXT_OIDC_PROVIDERS_OIDC_ISSUER:-}
      NUXT_OIDC_PROVIDERS_OIDC_JWKS_URI: ${NUXT_OIDC_PROVIDERS_OIDC_JWKS_URI:-}
      NUXT_OIDC_PROVIDERS_OIDC_LOGOUT_URL: ${NUXT_OIDC_PROVIDERS_OIDC_LOGOUT_URL:-}
      NUXT_OIDC_PROVIDERS_OIDC_OPENID_CONFIGURATION: ${NUXT_OIDC_PROVIDERS_OIDC_OPENID_CONFIGURATION:-}
      NUXT_OIDC_PROVIDERS_OIDC_TOKEN_URL: ${NUXT_OIDC_PROVIDERS_OIDC_TOKEN_URL:-}
      NUXT_OIDC_PROVIDERS_OIDC_USER_INFO_URL: ${NUXT_OIDC_PROVIDERS_OIDC_USER_INFO_URL:-}
      NUXT_OIDC_SESSION_SECRET: ${NUXT_OIDC_SESSION_SECRET:-}
      NUXT_OIDC_TOKEN_KEY: ${NUXT_OIDC_TOKEN_KEY:-}
    ports:
      - "${NUXT_HOST_PORT:-3300}:3300"
    volumes:
      - .:/app
      - nuxt_app_node_modules:/app/node_modules

volumes:
  nuxt_app_node_modules:
